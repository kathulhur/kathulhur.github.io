<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Portfolio · Five directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mockups.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const W = 1280;
  const H = 800;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="directions" title="Software Portfolio — Five Directions" subtitle="Click ⤢ on any artboard to focus it fullscreen. Drag the grip to reorder.">
          <DCArtboard id="terminal" label="01 · Terminal / IDE" width={W} height={H}>
            <TerminalMock />
          </DCArtboard>
          <DCArtboard id="editorial" label="02 · Editorial / Magazine" width={W} height={H}>
            <EditorialMock />
          </DCArtboard>
          <DCArtboard id="dashboard" label="03 · Live Dashboard" width={W} height={H}>
            <DashMock />
          </DCArtboard>
          <DCArtboard id="spatial" label="04 · Spatial Canvas" width={W} height={H}>
            <SpatialMock />
          </DCArtboard>
          <DCArtboard id="notebook" label="05 · Engineer's Notebook" width={W} height={H}>
            <NotebookMock />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
